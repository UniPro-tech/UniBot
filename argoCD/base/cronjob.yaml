apiVersion: batch/v1
kind: CronJob
metadata:
  name: rss
spec:
  schedule: "* * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: internal-harbor
          containers:
            - name: rss-cron
              image: registry.uniproject.jp/infra/rss-cron:1.0.0
              imagePullPolicy: Always
              envFrom:
                - secretRef:
                    name: unibot-env
              env:
                - name: TZ
                  value: Asia/Tokyo
