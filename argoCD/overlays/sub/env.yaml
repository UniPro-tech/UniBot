---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: psql-secret
  namespace: unibot-sub
spec:
  encryptedData:
    POSTGRES_DB: 
    POSTGRES_PASSWORD: 
    POSTGRES_USER: 
  template:
    metadata:
      name: psql-secret
      namespace: unibot-sub
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: unibot-env
  namespace: unibot-sub
spec:
  encryptedData:
    CONFIG_ADMIN_GUILD_ID: 
    CONFIG_ADMIN_ROLE_ID: 
    DISCORD_TOKEN: 
    GITHUB_OAUTH_ID: 
    GITHUB_OAUTH_SECRET: 
    PG_DSN: 
    VOICEVOX_API_KEY: 
    VOICEVOX_RESTRICT_ADMIN: 
    VOICEVOX_URI: 
  template:
    metadata:
      name: unibot-env
      namespace: unibot-sub
    type: Opaque
